<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div onClick="{{ onOpen }}" style="background:var(--c-card,#13132A); border:1px solid var(--c-border,#25254A); border-radius:14px; overflow:hidden; cursor:pointer; display:flex; flex-direction:column; height:100%; transition:border-color .15s ease;" style-hover="border-color:var(--c-border-strong,#35356A);">
  <div data-theme="dark" style="position:relative; height:122px; background:{{ p.bannerBg }}; display:flex; align-items:center; justify-content:center; overflow:hidden;">
    <span style="color:#fff; opacity:0.22; transform:scale(1.4);">{{ p.glyph }}</span>
    <div style="position:absolute; top:12px; left:12px;">
      <x-import component-from-global-scope="CobaltMidnightDesignSystem_f8c3dc.StatusBadge" status="{{ p.status }}" hint-size="auto,26px"></x-import>
    </div>
    <span style="position:absolute; top:12px; right:12px; display:inline-flex; align-items:center; gap:5px; background:rgba(10,10,11,0.55); border:1px solid rgba(255,255,255,0.12); border-radius:9999px; padding:5px 10px; font:500 11px/1 Inter; color:#F4F4F5;">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>
      {{ p.daysLeft }}d left
    </span>
  </div>
  <div style="padding:16px; display:flex; flex-direction:column; gap:14px; flex:1;">
    <div>
      <div style="font:500 16px/1.3 Inter; color:var(--c-text,#F8F8F8);">{{ p.title }}</div>
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;">
        <x-import component-from-global-scope="CobaltMidnightDesignSystem_f8c3dc.MetaBadge" type="location" hint-size="auto,26px">{{ p.location }}</x-import>
        <x-import component-from-global-scope="CobaltMidnightDesignSystem_f8c3dc.MetaBadge" type="category" hint-size="auto,26px">{{ p.category }}</x-import>
      </div>
    </div>
    <x-import component-from-global-scope="CobaltMidnightDesignSystem_f8c3dc.FundingProgress" raised="{{ p.raised }}" goal="{{ p.goal }}" hint-size="100%,56px"></x-import>
    <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
      <x-import component-from-global-scope="CobaltMidnightDesignSystem_f8c3dc.InvestorCount" count="{{ p.investors }}" hint-size="auto,20px"></x-import>
      <x-import component-from-global-scope="CobaltMidnightDesignSystem_f8c3dc.RiskBadge" level="{{ p.risk }}" hint-size="auto,26px"></x-import>
    </div>
    <div style="display:flex; gap:6px; margin-top:auto; padding-top:14px; border-top:1px solid var(--c-divider,#1E1E3A);">
      <sc-for list="{{ p.trustTop }}" as="tb" hint-placeholder-count="3">
        <x-import component-from-global-scope="CobaltMidnightDesignSystem_f8c3dc.TrustBadge" type="{{ tb }}" icon-only="{{ true }}" hint-size="30px,30px"></x-import>
      </sc-for>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:340,&quot;height&quot;:430},&quot;p&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;object&quot;},&quot;onOpen&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}"></script>
</body>
</html>
